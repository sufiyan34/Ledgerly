<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ledgerly Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0e1a;
            color: #e0e8f0;
            margin: 0;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(15, 21, 36, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(125, 211, 252, 0.1);
        }
        .glass-card {
            background: rgba(15, 21, 36, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(125, 211, 252, 0.15);
        }
        .ice-glow {
            box-shadow: 0 0 30px rgba(125, 211, 252, 0.15);
        }
        .active-dot {
            width: 24px;
            background: #7dd3fc;
            box-shadow: 0 0 10px rgba(125, 211, 252, 0.5);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#c8eaff",
                        "on-secondary-fixed-variant": "#2a4a5e",
                        "secondary-container": "#1a3a4e",
                        "primary": "#7dd3fc",
                        "on-tertiary": "#1a002e",
                        "inverse-on-surface": "#0a0e1a",
                        "surface-dim": "#0f1524",
                        "surface-container-low": "#111828",
                        "on-primary-container": "#c8eaff",
                        "on-error-container": "#ffb3b3",
                        "inverse-primary": "#0a4c6e",
                        "surface-tint": "#7dd3fc",
                        "surface-variant": "#1a2438",
                        "outline": "#4a6070",
                        "on-surface-variant": "#a0b4c4",
                        "error-container": "#3d1414",
                        "surface-container-high": "#1a2438",
                        "surface-container-lowest": "#0a0e1a",
                        "secondary-fixed": "#c0d8e8",
                        "surface-bright": "#1a2438",
                        "on-tertiary-fixed": "#1a002e",
                        "surface-container": "#141c2e",
                        "on-primary-fixed": "#001f2e",
                        "inverse-surface": "#e0e8f0",
                        "surface-container-highest": "#202c42",
                        "on-secondary-container": "#c0d8e8",
                        "on-primary": "#001f2e",
                        "primary-fixed-dim": "#7dd3fc",
                        "error": "#ff6b6b",
                        "tertiary-fixed": "#e8d0ff",
                        "primary-container": "#0e4d6e",
                        "on-secondary": "#001f2e",
                        "on-tertiary-container": "#e8d0ff",
                        "on-background": "#e0e8f0",
                        "background": "#0a0e1a",
                        "secondary-fixed-dim": "#88b4cc",
                        "secondary": "#88b4cc",
                        "tertiary-container": "#3d2060",
                        "on-tertiary-fixed-variant": "#4d2a73",
                        "on-surface": "#e0e8f0",
                        "on-secondary-fixed": "#0d1f2b",
                        "tertiary": "#c8a0f0",
                        "on-error": "#1a0000",
                        "tertiary-fixed-dim": "#c8a0f0",
                        "on-primary-fixed-variant": "#004d73",
                        "outline-variant": "#2a3a48",
                        "surface": "#0f1524"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "display": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface h-screen flex flex-col overflow-hidden relative">
<!-- Background Atmospheric Shader -->

<!-- Top AppBar (Identity Reference) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 py-8">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="text-xl font-bold tracking-tighter text-on-surface">Ledgerly</h1>
</div>
<button class="text-on-surface-variant font-medium text-sm hover:text-primary transition-colors duration-300">
            Skip
        </button>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-8 relative z-10">
<!-- Illustration Container -->
<div class="relative w-full max-w-sm aspect-square flex items-center justify-center mb-12">
<!-- Background Glow -->
<div class="absolute w-64 h-64 bg-primary/10 rounded-full blur-[80px]"></div>
<!-- Glassmorphic Chart Mockup -->
<div class="animate-float relative z-20 w-full glass-card rounded-3xl p-6 overflow-hidden">
<div class="flex items-center justify-between mb-8">
<div class="space-y-1">
<p class="text-xs text-on-surface-variant uppercase tracking-widest font-semibold">Monthly Limit</p>
<p class="text-2xl font-bold text-primary">$4,250.00</p>
</div>
<div class="w-12 h-12 rounded-full border border-primary/20 flex items-center justify-center bg-primary/5">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">show_chart</span>
</div>
</div>
<div class="flex items-end justify-between h-32 gap-3">
<div class="w-full bg-primary/10 rounded-t-lg relative group h-[40%]">
<div class="absolute bottom-0 w-full bg-primary/40 rounded-t-lg transition-all duration-700 h-[60%]"></div>
</div>
<div class="w-full bg-primary/10 rounded-t-lg relative group h-[60%]">
<div class="absolute bottom-0 w-full bg-primary/40 rounded-t-lg transition-all duration-700 h-[80%]"></div>
</div>
<div class="w-full bg-primary/10 rounded-t-lg relative group h-[85%]">
<div class="absolute bottom-0 w-full bg-primary/60 rounded-t-lg transition-all duration-700 h-[90%] shadow-[0_-4px_20px_rgba(125,211,252,0.3)]"></div>
</div>
<div class="w-full bg-primary/10 rounded-t-lg relative group h-[50%]">
<div class="absolute bottom-0 w-full bg-primary/40 rounded-t-lg transition-all duration-700 h-[40%]"></div>
</div>
<div class="w-full bg-primary/10 rounded-t-lg relative group h-[70%]">
<div class="absolute bottom-0 w-full bg-primary/40 rounded-t-lg transition-all duration-700 h-[65%]"></div>
</div>
</div>
<!-- Floating Translucent Elements -->
<div class="absolute top-1/2 -right-4 glass-panel p-3 rounded-xl border-primary/20 animate-pulse">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary text-sm">trending_up</span>
<span class="text-[10px] font-bold text-on-surface">+12%</span>
</div>
</div>
</div>
<!-- Decorative Elements -->
<div class="absolute -top-6 -left-6 w-24 h-24 glass-panel rounded-full border-primary/10 flex items-center justify-center rotate-12">
<span class="material-symbols-outlined text-primary/40 text-3xl">insights</span>
</div>
</div>
<!-- Content Area -->
<div class="text-center max-w-md space-y-4">
<h2 class="text-3xl font-extrabold tracking-tight text-on-surface leading-tight">
                Track Expenses Effortlessly
            </h2>
<p class="text-on-surface-variant text-lg leading-relaxed font-light">
                Monitor your spending with beautiful, translucent analytics designed to give you clarity and peace of mind.
            </p>
</div>
</main>
<!-- Footer Controls -->
<footer class="p-8 flex flex-col items-center gap-8 relative z-20">
<!-- Page Indicator Dots -->
<div class="flex items-center gap-2">
<div class="h-1.5 active-dot rounded-full transition-all duration-300"></div>
<div class="h-1.5 w-1.5 bg-primary/20 rounded-full"></div>
<div class="h-1.5 w-1.5 bg-primary/20 rounded-full"></div>
<div class="h-1.5 w-1.5 bg-primary/20 rounded-full"></div>
</div>
<!-- Action Button -->
<div class="w-full max-w-sm">
<button class="w-full group relative flex items-center justify-center py-4 bg-primary/10 border border-primary/30 rounded-2xl hover:bg-primary/20 transition-all duration-300 ice-glow active:scale-95">
<span class="text-primary font-bold tracking-wide uppercase text-sm">Next Step</span>
<span class="material-symbols-outlined absolute right-6 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</footer>
<!-- Background Vignette/Gradient Layer -->
<div class="fixed inset-0 pointer-events-none bg-gradient-to-b from-transparent via-transparent to-background/80"></div>
<script>
        // Micro-interactions for bars
        document.addEventListener('DOMContentLoaded', () => {
            const bars = document.querySelectorAll('.bg-primary\\/40, .bg-primary\\/60');
            bars.forEach((bar, index) => {
                const originalHeight = bar.style.height;
                bar.style.height = '0%';
                setTimeout(() => {
                    bar.style.height = originalHeight || (60 + index * 5) + '%';
                }, 400 + (index * 100));
            });
        });
    </script>
</body></html>
